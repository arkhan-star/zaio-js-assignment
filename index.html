<!DOCTYPE html>
    <html lang="en">
        <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>JavaScript Assignment</title>
        </head>
        <body>
            <section class="logic">
                <input type="number" id="grade" placeholder="Enter your grade">
